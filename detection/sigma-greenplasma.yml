title: GreenPlasma - Object Manager Symlink Detection
id: 8b4f3d9e-2c5e-4f9a-0d3b-7e6a9d2c4e5f
status: experimental
description: >
  Detects creation of NT Object Manager symbolic links at CTF AsmListCache paths,
  which is the initial stage of the GreenPlasma exploit.
references:
  - https://github.com/Nightmare-Eclipse/GreenPlasma
author: Security Research
date: 2026/05/13
tags:
  - attack.privilege_escalation
  - attack.t1574.012  # Hijack Execution Flow: COR_PROFILER
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4663
    ObjectType: 'SymbolicLinkObject'
    ObjectName|contains:
      - 'CTF.AsmListCache.FMPWinlogon'
  condition: selection
falsepositives:
  - Unknown legitimate use of CTF AsmListCache symlinks (none documented)
level: high
---
title: GreenPlasma - Registry Link Creation for Policy Hijack
id: 9c5d4e0f-3a6f-4b0a-1e4c-8f7b0e3d5a6b
status: experimental
description: >
  Detects creation of registry symbolic links (REG_OPTION_CREATE_LINK) under
  CloudFiles\BlockedApps, which is used in GreenPlasma to hijack policy evaluation.
references:
  - https://github.com/Nightmare-Eclipse/GreenPlasma
author: Security Research
date: 2026/05/13
tags:
  - attack.privilege_escalation
  - attack.t1112  # Modify Registry
  - attack.t1574  # Hijack Execution Flow
logsource:
  product: windows
  service: sysmon
detection:
  selection_key_create:
    EventID: 12  # Registry object created/deleted
    TargetObject|contains:
      - '\Software\Policies\Microsoft\CloudFiles\BlockedApps'
    Details: 'KeyCreated'
  selection_link_flag:
    EventID: 12
    TargetObject|contains:
      - '\Software\Policies\Microsoft\CloudFiles\BlockedApps'
  condition: selection_key_create
falsepositives:
  - Legitimate Cloud Files BlockedApps configuration (very rare)
level: high