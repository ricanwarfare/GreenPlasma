title: GreenPlasma CTFMON Arbitrary Section Creation EoP
id: 7a3f2c8e-1b4d-4e8f-9c2a-6d5e8f1a2b3c
status: experimental
description: >
  Detects exploitation of the GreenPlasma vulnerability (CTFMON Arbitrary Section Creation EoP).
  A standard user creates an Object Manager symbolic link at the CTF AsmListCache path to redirect
  ctfmon's section creation, then hijacks registry policy via CloudFiles symlink to escalate to SYSTEM.
references:
  - https://github.com/Nightmare-Eclipse/GreenPlasma
author: Security Research
date: 2026/05/13
tags:
  - attack.privilege_escalation
  - attack.t1036  # Masquerading
  - attack.t1112  # Modify Registry
  - attack.t1574  # Hijack Execution Flow
  - attack.t1055  # Process Injection
logsource:
  product: windows
  service: sysmon
detection:
  selection_symlink_creation:
    EventID: 1
    Image|endswith:
      - '\ctfmon.exe'
    CommandLine|contains:
      - 'NtCreateSymbolicLinkObject'
  selection_registry_symlink:
    EventID: 13  # Registry value set
    TargetObject|contains:
      - '\Software\Policies\Microsoft\CloudFiles\BlockedApps\SymbolicLinkValue'
  selection_policy_hijack:
    EventID: 13
    TargetObject|contains:
      - '\Software\Microsoft\Windows\CurrentVersion\Policies\System\DisableLockWorkstation'
    Details: 'DWORD (0x00000001)'
  selection_dacl_modify_cloudfiles:
    EventID: 4663  # Object access
    ObjectType: 'Key'
    ObjectName|contains:
      - '\Policies\Microsoft\CloudFiles'
  selection_section_creation_dead:
    EventID: 1
    Image|endswith:
      - '\ctfmon.exe'
  selection_cfabort_call:
    EventID: 1
    Image|contains:
      - 'cldapi.dll'
  condition: selection_registry_symlink or selection_policy_hijack or (selection_dacl_modify_cloudfiles and selection_policy_hijack)
falsepositives:
  - Legitimate Cloud Files policy configuration (rare)
  - Administrator-configured DisableLockWorkstation policy (should be documented)
level: critical
